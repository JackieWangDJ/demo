apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: infra-elasticsearch
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  source:
    repoURL: https://charts.bitnami.com/bitnami
    chart: elasticsearch
    targetRevision: 22.1.6
    helm:
      values: |
        global:
          security:
            allowInsecureImages: true
        security:
          enabled: false
          tls:
            restEncryption: false
        master:
          replicaCount: 1
          resourcesPreset: nano
          heapSize: 256m
          persistence:
            enabled: true
            size: 8Gi
        data:
          replicaCount: 1
          resourcesPreset: nano
          heapSize: 256m
          persistence:
            enabled: true
            size: 8Gi
        coordinating:
          replicaCount: 0
        ingest:
          enabled: false
        service:
          type: NodePort
          nodePorts:
            restAPI: "30920"
  destination:
    server: https://kubernetes.default.svc
    namespace: infra
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
