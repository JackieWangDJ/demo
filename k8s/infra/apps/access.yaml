apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: infra-access
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: default
  source:
    repoURL: https://github.com/JackieWangDJ/demo
    targetRevision: HEAD
    path: k8s/infra/access
  destination:
    server: https://kubernetes.default.svc
    namespace: infra
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true