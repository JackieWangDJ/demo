apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: infra-kafka
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  source:
    repoURL: https://charts.bitnami.com/bitnami
    chart: kafka
    targetRevision: 32.4.3
    helm:
      values: |
        global:
          security:
            allowInsecureImages: true
        image:
          repository: bitnamilegacy/kafka
        listeners:
          client:
            protocol: PLAINTEXT
          controller:
            protocol: PLAINTEXT
          interbroker:
            protocol: PLAINTEXT
          external:
            protocol: PLAINTEXT
        sasl:
          enabledMechanisms: PLAIN
          interBrokerMechanism: PLAIN
          controllerMechanism: PLAIN
        controller:
          replicaCount: 1
          controllerOnly: false
          heapOpts: -Xms256m -Xmx256m
          overrideConfiguration:
            log.cleaner.enable: "false"
            offsets.topic.replication.factor: "1"
            transaction.state.log.replication.factor: "1"
            transaction.state.log.min.isr: "1"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 800m
              memory: 768Mi
          persistence:
            enabled: true
            size: 8Gi
        broker:
          replicaCount: 0
        service:
          type: NodePort
          nodePorts:
            client: "30092"
  destination:
    server: https://kubernetes.default.svc
    namespace: infra
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
