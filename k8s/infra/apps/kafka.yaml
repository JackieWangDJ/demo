apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: infra-kafka
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  source:
    repoURL: https://charts.bitnami.com/bitnami
    chart: kafka
    targetRevision: 32.4.3
    helm:
      values: |
        global:
          security:
            allowInsecureImages: true
        listeners:
          client:
            protocol: PLAINTEXT
          controller:
            protocol: PLAINTEXT
          interbroker:
            protocol: PLAINTEXT
          external:
            protocol: PLAINTEXT
        sasl:
          enabledMechanisms: PLAIN
          interBrokerMechanism: PLAIN
          controllerMechanism: PLAIN
        controller:
          replicaCount: 1
          persistence:
            enabled: true
            size: 8Gi
          resourcesPreset: nano
        broker:
          replicaCount: 0
        service:
          type: ClusterIP
  destination:
    server: https://kubernetes.default.svc
    namespace: infra
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
