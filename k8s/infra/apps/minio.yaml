apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: infra-minio
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  source:
    repoURL: https://charts.bitnami.com/bitnami
    chart: minio
    targetRevision: 17.0.21
    helm:
      values: |
        global:
          security:
            allowInsecureImages: true
        mode: standalone
        updateStrategy:
          type: Recreate
        image:
          repository: bitnamilegacy/minio
        clientImage:
          repository: bitnamilegacy/minio-client
        resourcesPreset: nano
        auth:
          rootUser: minioadmin
          rootPassword: Sherlock8962.
        defaultBuckets: social,public
        persistence:
          enabled: true
          size: 20Gi
        service:
          type: NodePort
          nodePorts:
            api: "31000"
        console:
          enabled: true
          resourcesPreset: nano
          image:
            repository: bitnamilegacy/minio-object-browser
          service:
            type: NodePort
            nodePorts:
              http: "31001"
  destination:
    server: https://kubernetes.default.svc
    namespace: infra
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
