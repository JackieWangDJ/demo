apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: infra
resources:
  - init-schema-job.yaml
  - deployment.yaml
  - service.yaml
  - service-nodeport.yaml
  - ingress.yaml
configMapGenerator:
  - name: nacos-custom-config
    files:
      - application.properties=application.properties
generatorOptions:
  disableNameSuffixHash: true
