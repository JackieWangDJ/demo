apiVersion: v1
kind: Service
metadata:
  name: mysql-nodeport
  namespace: infra
spec:
  type: NodePort
  selector:
    app.kubernetes.io/component: primary
    app.kubernetes.io/instance: infra-mysql
    app.kubernetes.io/name: mysql
  ports:
    - name: mysql
      port: 3306
      targetPort: 3306
      nodePort: 30306
      protocol: TCP