apiVersion: v1
kind: Service
metadata:
  name: redis-nodeport
  namespace: infra
spec:
  type: NodePort
  selector:
    app.kubernetes.io/component: master
    app.kubernetes.io/instance: infra-redis
    app.kubernetes.io/name: redis
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
      nodePort: 30379
      protocol: TCP