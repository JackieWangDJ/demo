apiVersion: v1
kind: Service
metadata:
  name: postgres-nodeport
  namespace: infra
spec:
  type: NodePort
  selector:
    app.kubernetes.io/component: primary
    app.kubernetes.io/instance: infra-postgres
    app.kubernetes.io/name: postgresql
  ports:
    - name: pg
      port: 5432
      targetPort: 5432
      nodePort: 30432
      protocol: TCP